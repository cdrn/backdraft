services:
  backdraft:
    image: ghcr.io/cdrn/backdraft:latest
    container_name: backdraft
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/backdraft.db
    volumes:
      - backdraft-data:/app/data

  # Seismographs — delta (stablecoin venue-basis, :4747) + funding
  # (cross-venue perp funding-basis, :4748) in one process. Same image,
  # separate container from the scanner/executor so the datasets never gap
  # while that churns. Both are calm poll loops, so they share a container.
  delta:
    image: ghcr.io/cdrn/backdraft:latest
    container_name: delta
    restart: unless-stopped
    env_file: .env
    command: ["node", "dist/seismograph.js"]
    environment:
      - DELTA_DB_PATH=/app/data/delta.db
      - FUNDING_DB_PATH=/app/data/funding.db
    ports:
      - "127.0.0.1:4747:4747"
      - "127.0.0.1:4748:4748"
    volumes:
      - delta-data:/app/data

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 backdraft delta

volumes:
  backdraft-data:
  delta-data:
